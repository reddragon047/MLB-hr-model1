name: MLB HR Daily Board

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Slate date YYYY-MM-DD (blank = today)"
        required: false
        default: ""
      sims:
        description: "Monte Carlo sims per player"
        required: false
        default: "20000"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pybaseball pandas numpy requests MLB-StatsAPI lxml pyarrow

      - name: Run HR board
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python hr_run_daily.py --date "${{ github.event.inputs.date }}" --sims "${{ github.event.inputs.sims || '20000' }}"
          else
            python hr_run_daily.py --sims "${{ github.event.inputs.sims || '20000' }}"
          fi

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: hr-output
          path: |
            hr_board.csv
            hr_debug.csv
            outputs/*.csv
