name: MLB HR Daily Board

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pybaseball pandas numpy lxml pyarrow

      - name: Run HR board
        run: python hr_run_daily.py

      - name: Show output files
        run: ls -la

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: hr-output
          path: |
            hr_board.csv
            hr_debug.csv
